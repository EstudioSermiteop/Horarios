<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Níwer - Tareas de Grupos</title>

<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box;font-family:system-ui,Arial}
body{margin:0;background:#0f172a;color:white}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#020617;
}

.topbar button{
  background:#334155;
  color:white;
  padding:8px 12px;
  border:none;
  border-radius:10px;
}

header{
  padding:10px;
  text-align:center;
  background:#111827;
  font-weight:bold;
}

.container{padding:14px;max-width:900px;margin:auto}

button,select,input,textarea{
  padding:10px;
  border-radius:10px;
  border:none;
  margin:6px 4px;
}

button{background:#22c55e;color:black;font-weight:bold}
button.secondary{background:#334155;color:white}

.card{background:#1e293b;padding:12px;border-radius:14px;margin-top:12px}
.hidden{display:none}

.itemHorario{
  background:#020617;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  cursor:pointer;
}

.tablaWrap{margin-top:8px}

.lockBtn{
  position:fixed;
  bottom:14px;
  right:14px;
  background:#334155;
  border-radius:50%;
  width:50px;
  height:50px;
  font-size:20px;
}

/* ☰ botón menú */
.menuBtn{
  position:fixed;
  top:12px;
  left:12px;
  background:linear-gradient(135deg,#22c55e,#a855f7,#ec4899);
  width:44px;
  height:44px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
  z-index:20;
}

/* menú lateral */
.sideMenu{
  position:fixed;
  top:0;
  left:0;
  width:240px;
  height:100%;
  background:#111827;
  padding-top:70px;
  z-index:15;
  box-shadow:0 0 20px rgba(0,0,0,.6);
}

.menuItem{
  padding:16px;
  border-bottom:1px solid #334155;
  cursor:pointer;
  font-size:18px;
}

.menuItem:hover{ background:#1e293b; }

table{width:100%;border-collapse:collapse;margin-top:12px;font-size:12px}
th,td{border:1px solid #334155;padding:6px;text-align:center}
th{background:#334155}

@media (max-width:600px){
  table{font-size:10px}
}
</style>
</head>
<body>

<!-- ☰ -->
<div class="menuBtn" onclick="toggleMenu()">☰</div>

<!-- MENU -->
<div id="sideMenu" class="sideMenu hidden">
  <div class="menuItem" onclick="abrirSeccion('horarios')">📂 Horarios</div>
  <div class="menuItem" onclick="abrirSeccion('ia')">🤖 IA tareas</div>
  <div class="menuItem" onclick="abrirSeccion('tareas')">📚 Tareas de grupos</div>
  <div class="menuItem" onclick="abrirSeccion('vacaciones')">🌴 ¿Cuánto falta para las vacaciones?</div>
</div>

<div class="topbar">
  <button id="btnHome" class="hidden" onclick="volverInicio()">🏠 Home</button>
  <button onclick="verGuardados()">📂 Horarios</button>
</div>

<header>📚 Níwer</header>

<div class="container">

<!-- HOME -->
<div id="pantallaInicio" class="card hidden">
  <button onclick="irCrear()">➕ Crear horario escolar</button>
</div>

<!-- CONFIG -->
<div id="pantallaConfig" class="card hidden">
  <button class="secondary" onclick="volverInicio()">⬅️ Volver</button>
  <div>
    Horas:
    <select id="numHoras">
      <option>5</option>
      <option>6</option>
      <option>7</option>
      <option>8</option>
    </select>
  </div>
  <button onclick="crearHorario()">Crear horario</button>
</div>

<!-- TABLA -->
<div id="pantallaHorario" class="card hidden">
  <button class="secondary" onclick="volverConfig()">⬅️ Regresar</button>
  <button id="btnGuardar" onclick="guardarHorario()">💾 Guardar horario</button>
  <table id="tabla"></table>
</div>

<!-- LISTA HORARIOS -->
<div id="pantallaGuardados" class="card">
  <div id="listaHorarios"></div>
</div>

<!-- TAREAS DE GRUPOS -->
<div id="pantallaTareas" class="card hidden">
  <h2>📚 Tareas de Grupos</h2>

  <button onclick="toggleFormularioTarea()">✍️ Subir tarea de tu grupo</button>

  <div id="formTarea" class="card hidden" style="margin-top:10px;">
    <h3>📝 Nueva Tarea</h3>

    <label for="tareaTitulo">Título:</label><br>
    <input id="tareaTitulo" placeholder="Escribe el título de tu tarea" style="width:100%; margin-bottom:6px;" /><br>

    <label for="tareaAutor">Autor:</label><br>
    <input id="tareaAutor" placeholder="Tu nombre o seudónimo" style="width:100%; margin-bottom:6px;" /><br>

    <label for="tareaDescripcion">Descripción / Instrucciones:</label><br>
    <textarea id="tareaDescripcion" placeholder="Descripción de la tarea" style="width:100%; margin-bottom:6px;"></textarea><br>

    <label for="tareaGrado">Grado y grupo:</label><br>
    <select id="tareaGrado" style="width:100%; margin-bottom:6px;">
      <option>1A</option><option>1B</option><option>1C</option><option>1D</option><option>1E</option><option>1F</option>
      <option>2A</option><option>2B</option><option>2C</option><option>2D</option><option>2E</option><option>2F</option>
      <option>3A</option><option>3B</option><option>3C</option><option>3D</option><option>3E</option><option>3F</option>
    </select><br>

    <label for="tareaImagenes">Imágenes (puedes subir varias):</label><br>
    <input type="file" id="tareaImagenes" accept="image/*" multiple style="margin-bottom:6px;" /><br>

    <button onclick="enviarTarea()">📤 Enviar al creador para que lo acepte</button>
  </div>

  <div id="listaTareas" style="margin-top:10px;"></div>
</div>

</div>

<button class="lockBtn" onclick="pedirLlave()">🔒</button>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "estudio-sermiteop.firebaseapp.com",
  databaseURL: "https://estudio-sermiteop-default-rtdb.firebaseio.com",
  projectId: "estudio-sermiteop",
  storageBucket: "estudio-sermiteop.firebasestorage.app",
  messagingSenderId: "223030697007",
  appId: "1:223030697007:web:fe4aa6b863b7ebf521bada"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let esAdmin = false;
const LLAVE = "Eduardo61101";

function pedirLlave(){
  const clave = prompt("Llave de admin");
  if(clave === LLAVE){
    esAdmin = true;
    document.getElementById("btnHome").classList.remove("hidden");
    document.getElementById("pantallaInicio").classList.remove("hidden");
    alert("Modo admin activado ✅");
  }else{
    alert("Llave incorrecta");
  }
}

// Mostrar/ocultar formularios
function toggleFormularioTarea(){
  const form = document.getElementById("formTarea");
  if(form) form.classList.toggle("hidden");
}

// Mostrar secciones
function mostrar(id){
  ["pantallaInicio","pantallaConfig","pantallaHorario","pantallaGuardados","pantallaTareas"].forEach(x=>{
    const el=document.getElementById(x);
    if(el) el.classList.add("hidden");
  });
  const destino=document.getElementById(id);
  if(destino) destino.classList.remove("hidden");
}

function volverInicio(){ mostrar("pantallaInicio"); }
function volverConfig(){ mostrar("pantallaConfig"); }
function irCrear(){ mostrar("pantallaConfig"); }

// Crear y guardar horarios
function crearHorario(){
  const tabla=document.getElementById("tabla");
  tabla.innerHTML="<tr><th>Hora</th><th>Lun</th><th>Mar</th><th>Mié</th><th>Jue</th><th>Vie</th></tr>";
  const num=parseInt(document.getElementById("numHoras").value);
  for(let i=1;i<=num;i++){
    const tr=document.createElement("tr");
    const tdHora=document.createElement("td");
    tdHora.textContent="Bloque "+i; tr.appendChild(tdHora);
    for(let d=0;d<5;d++){
      const td=document.createElement("td");
      td.contentEditable=true; td.textContent="Materia"; tr.appendChild(td);
    }
    tabla.appendChild(tr);
  }
}

async function guardarHorario(){
  const nombre=prompt("Nombre del horario");
  if(!nombre) return;
  const tablaHTML=document.getElementById("tabla").innerHTML;
  await db.ref("horarios").push({nombre,tabla:tablaHTML});
  alert("Guardado ✅");
}

// Ver horarios
function verGuardados(){ mostrar("pantallaGuardados"); }

// Menú
function toggleMenu(){ document.getElementById("sideMenu").classList.toggle("hidden"); }
function abrirSeccion(sec){
  toggleMenu();
  if(sec==="horarios") verGuardados();
  if(sec==="ia") alert("🤖 Próximamente IA de tareas");
  if(sec==="tareas"){ mostrar("pantallaTareas"); mostrarTareas(); }
  if(sec==="vacaciones"){
    const hoy=new Date();
    const vac=new Date("2026-07-01");
    alert("🌴 Faltan "+Math.ceil((vac-hoy)/(1000*60*60*24))+" días");
  }
}

// Subir tarea
function enviarTarea(){
  const titulo=document.getElementById("tareaTitulo").value.trim();
  const autor=document.getElementById("tareaAutor").value.trim();
  const desc=document.getElementById("tareaDescripcion").value.trim();
  const grado=document.getElementById("tareaGrado").value;
  const imgs=document.getElementById("tareaImagenes").files;

  if(!titulo||!autor||!desc||imgs.length===0) return alert("Completa todos los campos");

  let imgPromises = [];
  for(let i=0;i<imgs.length;i++){
    const reader = new FileReader();
    const p = new Promise(resolve=>{
      reader.onload=function(e){ resolve(e.target.result); };
      reader.readAsDataURL(imgs[i]);
    });
    imgPromises.push(p);
  }

  Promise.all(imgPromises).then(imgDataArray=>{
    db.ref("tareas").push({
      titulo,
      autor,
      descripcion: desc,
      grado,
      imagenes: imgDataArray,
      estado: "pendiente"
    });
    alert("Tarea enviada ✅");
    toggleFormularioTarea(); // oculta el formulario
    document.getElementById("tareaTitulo").value="";
    document.getElementById("tareaAutor").value="";
    document.getElementById("tareaDescripcion").value="";
    document.getElementById("tareaImagenes").value="";
  });
}

// Mostrar tareas
function mostrarTareas(){
  const cont=document.getElementById("listaTareas");
  if(!cont) return;
  cont.innerHTML="";
  db.ref("tareas").on("value", snap=>{
    cont.innerHTML="";
    snap.forEach(child=>{
      const data=child.val();
      const key=child.key;
      const div=document.createElement("div");
      div.className="itemHorario";

      if(esAdmin){
        div.innerHTML=`<b>${data.titulo}</b><br>
          <small>${data.autor} - ${data.grado}</small><br>
          Estado: ${data.estado}<br>
          <button onclick="aceptarTarea('${key}')">✅ Aceptar</button>
          <button onclick="rechazarTarea('${key}')">❌ Rechazar</button>`;
      } else if(data.estado==="aceptada"){
        div.innerHTML=`<b>${data.titulo}</b><br>
          <small>${data.autor} - ${data.grado}</small><br>
          ${data.imagenes.map(img=>`<img src="${img}" style="width:100%;max-width:200px;"><br>`).join('')}
          ${data.descripcion}`;
      } else return;

      cont.appendChild(div);
    });
  });
}

// Admin: aceptar/rechazar
function aceptarTarea(key){ db.ref("tareas/"+key).update({estado:"aceptada"}); }
function rechazarTarea(key){ db.ref("tareas/"+key).remove(); } // se elimina automáticamente

</script>
</body>
  </html>
