<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Horarios</title>

<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box;font-family:system-ui,Arial}
body{margin:0;background:#0f172a;color:white}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#020617;
}

.topbar button{
  background:#334155;
  color:white;
  padding:8px 12px;
  border:none;
  border-radius:10px;
}

header{
  padding:10px;
  text-align:center;
  background:#111827;
  font-weight:bold;
}

.container{padding:14px;max-width:900px;margin:auto}

button,select,input{
  padding:10px;
  border-radius:10px;
  border:none;
  margin:6px 4px;
}

button{background:#22c55e;color:black;font-weight:bold}
button.secondary{background:#334155;color:white}

.card{background:#1e293b;padding:12px;border-radius:14px;margin-top:12px}
.hidden{display:none}

.itemHorario{
  background:#020617;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  cursor:pointer;
}

.tablaWrap{margin-top:8px}

.lockBtn{
  position:fixed;
  bottom:14px;
  right:14px;
  background:#334155;
  border-radius:50%;
  width:50px;
  height:50px;
  font-size:20px;
}

/* ☰ botón menú */
.menuBtn{
  position:fixed;
  top:12px;
  left:12px;
  background:linear-gradient(135deg,#22c55e,#a855f7,#ec4899);
  width:44px;
  height:44px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
  z-index:20;
}

/* menú lateral */
.sideMenu{
  position:fixed;
  top:0;
  left:0;
  width:240px;
  height:100%;
  background:#111827;
  padding-top:70px;
  z-index:15;
  box-shadow:0 0 20px rgba(0,0,0,.6);
}

.menuItem{
  padding:16px;
  border-bottom:1px solid #334155;
  cursor:pointer;
  font-size:18px;
}

.menuItem:hover{
  background:#1e293b;
}

table{width:100%;border-collapse:collapse;margin-top:12px;font-size:12px}
th,td{border:1px solid #334155;padding:6px;text-align:center}
th{background:#334155}

@media (max-width:600px){
  table{font-size:10px}
}
</style>
</head>
<body>

<!-- ☰ -->
<div class="menuBtn" onclick="toggleMenu()">☰</div>

<!-- MENU -->
<div id="sideMenu" class="sideMenu hidden">
  <div class="menuItem" onclick="abrirSeccion('horarios')">📂 Horarios</div>
  <div class="menuItem" onclick="abrirSeccion('ia')">🤖 IA tareas</div>
  <div class="menuItem" onclick="abrirSeccion('biblioteca')">📚 Biblioteca</div>
  <div class="menuItem" onclick="abrirSeccion('vacaciones')">🌴 ¿Cuánto falta?</div>
</div>

<div class="topbar">
  <button id="btnHome" class="hidden" onclick="volverInicio()">🏠 Home</button>
  <button onclick="verGuardados()">📂 Horarios</button>
</div>

<header>📚 Horarios</header>

<div class="container">

<!-- HOME -->
<div id="pantallaInicio" class="card hidden">
  <button onclick="irCrear()">➕ Crear horario escolar</button>
</div>

<!-- CONFIG -->
<div id="pantallaConfig" class="card hidden">
  <button class="secondary" onclick="volverInicio()">⬅️ Volver</button>

  <div>
    Horas:
    <select id="numHoras">
      <option>5</option>
      <option>6</option>
      <option>7</option>
      <option>8</option>
    </select>
  </div>

  <button onclick="crearHorario()">Crear horario</button>
</div>

<!-- TABLA -->
<div id="pantallaHorario" class="card hidden">
  <button class="secondary" onclick="volverConfig()">⬅️ Regresar</button>
  <button id="btnGuardar" onclick="guardarHorario()">💾 Guardar horario</button>
  <table id="tabla"></table>
</div>

<!-- LISTA -->
<div id="pantallaGuardados" class="card">
  <div id="listaHorarios"></div>
</div>

</div>

<button class="lockBtn" onclick="pedirLlave()">🔒</button>

<script>
// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBBODZcEB4yIm2-UjpjveBy2tr7RDT-hYo",
  authDomain: "estudio-sermiteop.firebaseapp.com",
  databaseURL: "https://estudio-sermiteop-default-rtdb.firebaseio.com",
  projectId: "estudio-sermiteop",
  storageBucket: "estudio-sermiteop.firebasestorage.app",
  messagingSenderId: "223030697007",
  appId: "1:223030697007:web:fe4aa6b863b7ebf521bada"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔐 ADMIN
let esAdmin = false;
const LLAVE = "Eduardo61101";

function pedirLlave(){
  const clave = prompt("Llave de admin");
  if(clave === LLAVE){
    esAdmin = true;
    document.getElementById("btnHome").classList.remove("hidden");
    document.getElementById("pantallaInicio").classList.remove("hidden");
    alert("Modo admin activado ✅");
  }else{
    alert("Llave incorrecta");
  }
}

// navegación
function mostrar(id){
  ["pantallaInicio","pantallaConfig","pantallaHorario","pantallaGuardados"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

function volverInicio(){ if(esAdmin) mostrar("pantallaInicio"); }
function volverConfig(){ mostrar("pantallaConfig"); }

function irCrear(){
  if(!esAdmin) return alert("🔒 Solo admin");
  mostrar("pantallaConfig");
}

// crear tabla
function crearHorario(){
  if(!esAdmin) return alert("🔒 Solo admin");

  mostrar("pantallaHorario");
  const tabla=document.getElementById("tabla");
  tabla.innerHTML="<tr><th>Hora</th><th>Lun</th><th>Mar</th><th>Mié</th><th>Jue</th><th>Vie</th></tr>";

  const num=parseInt(document.getElementById("numHoras").value);

  for(let i=1;i<=num;i++){
    const tr=document.createElement("tr");

    const tdHora=document.createElement("td");
    tdHora.textContent="Bloque "+i;
    tr.appendChild(tdHora);

    for(let d=0;d<5;d++){
      const td=document.createElement("td");
      td.contentEditable = true;
      td.textContent="Materia";
      tr.appendChild(td);
    }

    tabla.appendChild(tr);
  }
}

// guardar
async function guardarHorario(){
  if(!esAdmin) return alert("🔒 Solo admin");

  const nombre = prompt("Nombre del horario");
  if(!nombre) return;

  const tablaHTML=document.getElementById("tabla").innerHTML;

  await db.ref("horarios").push({
    nombre,
    tabla: tablaHTML
  });

  alert("Guardado ✅");
  verGuardados();
}

// ver horarios
function verGuardados(){ mostrar("pantallaGuardados"); }

function toggleTabla(el){ el.classList.toggle("hidden"); }

// realtime
db.ref("horarios").on("value", snap=>{
  const cont=document.getElementById("listaHorarios");
  cont.innerHTML="";

  snap.forEach(child=>{
    const data=child.val();
    const key=child.key;

    const wrap=document.createElement("div");
    wrap.className="itemHorario";

    const titulo=document.createElement("div");
    titulo.innerHTML=`<b>${data.nombre}</b>`;

    const tablaWrap=document.createElement("div");
    tablaWrap.className="tablaWrap hidden";
    tablaWrap.innerHTML=`<table>${data.tabla}</table>`;

    tablaWrap.querySelectorAll("td").forEach(td=>{
      td.contentEditable=false;
    });

    titulo.onclick=()=>toggleTabla(tablaWrap);

    wrap.appendChild(titulo);
    wrap.appendChild(tablaWrap);

    if(esAdmin){
      const btnDel=document.createElement("button");
      btnDel.textContent="🗑️ Borrar";
      btnDel.onclick=(e)=>{
        e.stopPropagation();
        db.ref("horarios/"+key).remove();
      };
      wrap.appendChild(btnDel);
    }

    cont.appendChild(wrap);
  });
});

// menú
function toggleMenu(){
  document.getElementById("sideMenu").classList.toggle("hidden");
}

function abrirSeccion(sec){
  toggleMenu();

  if(sec==="horarios") verGuardados();
  if(sec==="ia") alert("🤖 Próximamente IA de tareas");
  if(sec==="biblioteca") alert("📚 Próximamente biblioteca");
  if(sec==="vacaciones"){
    const hoy=new Date();
    const vac=new Date("2026-07-01");
    const diff=Math.ceil((vac-hoy)/(1000*60*60*24));
    alert("🌴 Faltan "+diff+" días");
  }
}
</script>
</body>
  </html>
