<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Níwer - Escolar</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box;font-family:system-ui,Arial}
body{margin:0;background:#0f172a;color:white}
.topbar{display:flex;justify-content:space-between;padding:10px;background:#020617;}
.topbar button{background:#334155;color:white;padding:8px 12px;border:none;border-radius:10px;}
header{padding:10px;text-align:center;background:#111827;font-weight:bold;}
.container{padding:14px;max-width:900px;margin:auto}
button,select,input,textarea{padding:10px;border-radius:10px;border:none;margin:6px 4px}
button{background:#22c55e;color:black;font-weight:bold}
button.secondary{background:#334155;color:white}
.card{background:#1e293b;padding:12px;border-radius:14px;margin-top:12px}
.hidden{display:none}
.itemHorario{background:#020617;padding:10px;border-radius:10px;margin-top:8px;cursor:pointer}
.lockBtn{position:fixed;bottom:14px;right:14px;background:#334155;border-radius:50%;width:50px;height:50px;font-size:20px}
.menuBtn{position:fixed;top:12px;left:12px;background:linear-gradient(135deg,#22c55e,#a855f7,#ec4899);width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;z-index:20}
.sideMenu{position:fixed;top:0;left:0;width:240px;height:100%;background:#111827;padding-top:70px;z-index:15;box-shadow:0 0 20px rgba(0,0,0,.6);}
.menuItem{padding:16px;border-bottom:1px solid #334155;cursor:pointer;font-size:18px}
.menuItem:hover{ background:#1e293b; }
table{width:100%;border-collapse:collapse;margin-top:12px;font-size:12px}
th,td{border:1px solid #334155;padding:6px;text-align:center}
th{background:#334155}
img{max-width:100%;border-radius:10px;margin-top:6px}
@media (max-width:600px){table{font-size:10px}}
</style>
</head>
<body>

<div class="menuBtn" onclick="toggleMenu()">☰</div>

<div id="sideMenu" class="sideMenu hidden">
  <div class="menuItem" onclick="abrirSeccion('horarios')">📂 Horarios</div>
  <div class="menuItem" onclick="abrirSeccion('tareas')">📚 Tareas de grupos</div>
  <div class="menuItem" onclick="abrirSeccion('avisos')">📢 Avisos</div>
  <div class="menuItem" onclick="abrirSeccion('juegos')">🎮 Juegos</div>
</div>

<div class="topbar">
  <button id="btnHome" class="hidden" onclick="volverInicio()">🏠 Home</button>
</div>

<header>📚 Níwer - Escolar</header>

<div class="container">

<!-- HOME -->
<div id="pantallaInicio" class="card hidden">
  <button onclick="irCrear()">➕ Crear horario escolar</button>
</div>

<!-- CONFIG HORARIO -->
<div id="pantallaConfig" class="card hidden">
  <button class="secondary" onclick="volverInicio()">⬅️ Volver</button>
  <div>Horas:
    <select id="numHoras">
      <option>5</option><option>6</option><option>7</option><option>8</option>
    </select>
  </div>
  <button onclick="crearHorario()">Crear horario</button>
</div>

<!-- TABLA HORARIO -->
<div id="pantallaHorario" class="card hidden">
  <button class="secondary" onclick="volverConfig()">⬅️ Regresar</button>
  <button id="btnGuardar" onclick="guardarHorario()">💾 Guardar horario</button>
  <table id="tabla"></table>
</div>

<!-- HORARIOS GUARDADOS -->
<div id="pantallaGuardados" class="card">
  <h3>📂 Horarios guardados</h3>
  <div id="listaHorarios"></div>
</div>

<!-- TAREAS -->
<div id="pantallaTareas" class="card hidden">
  <h2>📚 Tareas de Grupos</h2>
  <button onclick="toggleFormularioTarea()">✍️ Subir tarea</button>
  <div id="formTarea" class="card hidden" style="margin-top:10px;">
    <h3>📝 Nueva Tarea</h3>
    <label>Título:</label><br>
    <input id="tareaTitulo" placeholder="Título" style="width:100%;margin-bottom:6px;"><br>
    <label>Autor:</label><br>
    <input id="tareaAutor" placeholder="Nombre o seudónimo" style="width:100%;margin-bottom:6px;"><br>
    <label>Texto:</label><br>
    <textarea id="tareaDescripcion" placeholder="Texto, página, libro..." style="width:100%;margin-bottom:6px;"></textarea><br>
    <label>Grado:</label><br>
    <select id="tareaGrado" style="width:100%;margin-bottom:6px;">
      <option>1A</option><option>1B</option><option>1C</option>
      <option>2A</option><option>2B</option><option>2C</option>
      <option>3A</option><option>3B</option><option>3C</option>
    </select><br>
    <label>Imágenes:</label><br>
    <input type="file" id="tareaImagenes" accept="image/*" multiple style="margin-bottom:6px;"><br>
    <button onclick="enviarTarea()">📤 Enviar</button>
  </div>
  <div id="listaTareas" style="margin-top:10px;"></div>
</div>

<!-- AVISOS -->
<div id="pantallaAvisos" class="card hidden">
  <h2>📢 Avisos del administrador</h2>
  <div id="listaAvisos"></div>
  <div id="formAviso" class="card hidden" style="margin-top:10px;">
    <h3>➕ Nuevo aviso</h3>
    <textarea id="textoAviso" placeholder="Escribe el aviso..." style="width:100%;margin-bottom:6px;"></textarea><br>
    <input type="file" id="imagenAviso" accept="image/*" style="margin-bottom:6px;"><br>
    <button onclick="publicarAviso()">📤 Publicar</button>
  </div>
  <button onclick="toggleFormularioAviso()">✍️ Crear aviso</button>
</div>

</div>

<button class="lockBtn" onclick="pedirLlave()">🔒</button>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBBODZcEB4yIm2-UjpjveBy2tr7RDT-hYo",
  authDomain: "estudio-sermiteop.firebaseapp.com",
  databaseURL: "https://estudio-sermiteop-default-rtdb.firebaseio.com",
  projectId: "estudio-sermiteop",
  storageBucket: "estudio-sermiteop.firebasestorage.app",
  messagingSenderId: "223030697007",
  appId: "1:223030697007:web:fe4aa6b863b7ebf521bada"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let esAdmin=false;
const LLAVE="Eduardo61101";

function pedirLlave(){ const clave=prompt("Llave de admin"); if(clave===LLAVE){ esAdmin=true; document.getElementById("btnHome").classList.remove("hidden"); mostrar("pantallaInicio"); alert("Modo admin activado ✅"); } else alert("Llave incorrecta"); }

function toggleFormularioTarea(){ document.getElementById("formTarea").classList.toggle("hidden"); }
function toggleFormularioAviso(){ document.getElementById("formAviso").classList.toggle("hidden"); }

function mostrar(id){
  ["pantallaInicio","pantallaConfig","pantallaHorario","pantallaGuardados","pantallaTareas","pantallaAvisos"].forEach(x=>document.getElementById(x).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function volverInicio(){ mostrar("pantallaInicio"); }
function volverConfig(){ mostrar("pantallaConfig"); }
function irCrear(){ if(!esAdmin) return alert("🔒 Solo admin"); mostrar("pantallaConfig"); }

function toggleMenu(){ document.getElementById("sideMenu").classList.toggle("hidden"); }
function abrirSeccion(sec){
  toggleMenu();
  if(sec==="horarios") verGuardados();
  if(sec==="tareas"){ mostrar("pantallaTareas"); mostrarTareas(); }
  if(sec==="avisos"){ mostrar("pantallaAvisos"); cargarAvisos(); }
  if(sec==="juegos"){ window.location.href="juegos.html"; }
}

// --- HORARIOS ---
function crearHorario(){ if(!esAdmin) return alert("🔒 Solo admin"); const tabla=document.getElementById("tabla"); tabla.innerHTML="<tr><th>Hora</th><th>Lun</th><th>Mar</th><th>Mié</th><th>Jue</th><th>Vie</th></tr>"; const num=parseInt(document.getElementById("numHoras").value); for(let i=1;i<=num;i++){ const tr=document.createElement("tr"); const tdHora=document.createElement("td"); tdHora.textContent="Bloque "+i; tr.appendChild(tdHora); for(let d=0;d<5;d++){ const td=document.createElement("td"); td.contentEditable=true; td.textContent="Materia"; tr.appendChild(td);} tabla.appendChild(tr);} mostrar("pantallaHorario"); }

async function guardarHorario(){ if(!esAdmin) return alert("🔒 Solo admin"); const nombre=prompt("Nombre del horario"); if(!nombre) return; await db.ref("horarios").push({nombre,tabla:document.getElementById("tabla").innerHTML}); alert("Guardado ✅"); }

function verGuardados(){
  mostrar("pantallaGuardados");
  const lista=document.getElementById("listaHorarios");
  lista.innerHTML="";
  db.ref("horarios").on("value", snap=>{
    lista.innerHTML="";
    snap.forEach(child=>{
      const data=child.val(); const key=child.key;
      const div=document.createElement("div"); div.className="itemHorario"; div.style.cursor="pointer";
      div.innerHTML=`<b>${data.nombre}</b><br><button onclick="verHorario('${key}')">👁️ Ver</button><button onclick="borrarHorario('${key}')">🗑️ Borrar</button>`;
      lista.appendChild(div);
    });
  });
}

function verHorario(key){ db.ref("horarios/"+key).once("value").then(snap=>{ const data=snap.val(); if(data && data.tabla){ document.getElementById("tabla").innerHTML=data.tabla; mostrar("pantallaHorario"); } }); }
function borrarHorario(key){ if(!esAdmin){ alert("🔒 Solo el admin puede borrar horarios"); return;} if(confirm("¿Seguro quieres borrar este horario?")) db.ref("horarios/"+key).remove(); }

window.onload=function(){ verGuardados(); }

// --- TAREAS ---
function enviarTarea(){
  const titulo=document.getElementById("tareaTitulo").value.trim();
  const autor=document.getElementById("tareaAutor").value.trim();
  const desc=document.getElementById("tareaDescripcion").value.trim();
  const grado=document.getElementById("tareaGrado").value;
  const imgs=document.getElementById("tareaImagenes").files;
  if(!titulo||!autor||!desc) return alert("Completa todos los campos");
  let imgPromises=[];
  for(let i=0;i<imgs.length;i++){
    const reader=new FileReader();
    imgPromises.push(new Promise(resolve=>{ reader.onload=e=>resolve(e.target.result); reader.readAsDataURL(imgs[i]); }));
  }
  Promise.all(imgPromises).then(imgDataArray=>{
    db.ref("tareas").push({titulo,autor,descripcion:desc,grado,imagenes:imgDataArray,estado:"pendiente"});
    alert("Tarea enviada ✅");
    toggleFormularioTarea();
    document.getElementById("tareaTitulo").value="";
    document.getElementById("tareaAutor").value="";
    document.getElementById("tareaDescripcion").value="";
    document.getElementById("tareaImagenes").value="";
  });
}

function mostrarTareas(){
  const cont=document.getElementById("listaTareas"); cont.innerHTML="";
  db.ref("tareas").on("value", snap=>{ cont.innerHTML=""; snap.forEach(child=>{ const data=child.val(); const key=child.key; const div=document.createElement("div"); div.className="itemHorario"; if(esAdmin){ div.innerHTML=`<b>${data.titulo}</b><br><small>${data.autor}-${data.grado}</small><br>Estado:${data.estado}<br><button onclick="aceptarTarea('${key}')">✅</button><button onclick="rechazarTarea('${key}')">❌</button>`; } else if(data.estado==="aceptada"){ div.innerHTML=`<b>${data.titulo}</b><br><small>${data.autor}-${data.grado}</small><br>${data.descripcion}<br>${data.imagenes.map(img=>`<img src="${img}"><br>`).join('')}`; } cont.appendChild(div); }); });
}
function aceptarTarea(key){ db.ref("tareas/"+key).update({estado:"aceptada"}); }
function rechazarTarea(key){ db.ref("tareas/"+key).remove(); }

// --- AVISOS ---
function publicarAviso(){
  if(!esAdmin){ alert("Solo admin"); return; }
  const texto=document.getElementById("textoAviso").value.trim();
  const file=document.getElementById("imagenAviso").files[0];
  if(!texto && !file) return alert("Escribe un texto o sube imagen");
  if(file){
    const reader=new FileReader();
    reader.onload=e=>{
      db.ref("avisos").push({texto,imagen:e.target.result});
      alert("Aviso publicado ✅");
      toggleFormularioAviso();
      document.getElementById("textoAviso").value="";
      document.getElementById("imagenAviso").value="";
      cargarAvisos();
    };
    reader.readAsDataURL(file);
  } else {
    db.ref("avisos").push({texto,imagen:""});
    alert("Aviso publicado ✅");
    toggleFormularioAviso();
    document.getElementById("textoAviso").value="";
    cargarAvisos();
  }
}

function cargarAvisos(){
  const cont=document.getElementById("listaAvisos"); cont.innerHTML="";
  db.ref("avisos").on("value", snap=>{
    cont.innerHTML="";
    snap.forEach(child=>{
      const data=child.val();
      const div=document.createElement("div"); div.className="itemHorario";
      div.innerHTML=`${data.texto}<br>${data.imagen?`<img src="${data.imagen}">`:''}`;
      cont.appendChild(div);
    });
  });
}
</script>

</body>
</html>
